# OpenOcto Default Configuration

# Active persona
persona: "octo"

# Language: "auto" for auto-detection, or "en", "ru"
language: "auto"

# Audio I/O
audio:
  input_device: null       # null = system default
  output_device: null      # null = system default
  sample_rate: 16000
  blocksize: 1280          # 80ms chunks

# Wake word detection
wakeword:
  enabled: false           # true = always-on wake word, false = push-to-talk (Space)
  model: "octo_v0.1"      # OpenWakeWord model — "octo_v0.1" (custom) or built-in: hey_jarvis_v0.1, alexa_v0.1, hey_mycroft_v0.1
  threshold: 0.15
  cooldown: 2.0            # seconds between detections

# Voice Activity Detection
vad:
  engine: "silero"
  threshold: 0.5
  mic_gain: null           # null = auto-gain, or fixed multiplier (e.g. 30.0) — set via `openocto setup`
  silence_duration: 3.5    # seconds of silence to stop recording
  max_recording_duration: 60
  pre_speech_buffer: 0.3

# Speech-to-Text
stt:
  engine: "whisper.cpp"
  model_size: "small"      # tiny, base, small, medium, large
  language: "auto"         # auto-detect language
  n_threads: 4
  use_gpu: true

# Text-to-Speech
tts:
  engine: "piper"           # default engine for all languages
  engines: {}               # per-language overrides, e.g.: {ru: silero}
  models:
    en: "en_US-amy-medium"  # piper voice name
    ru: "xenia"             # silero speaker (used when engines.ru = silero)
  length_scale: 1.0
  sentence_silence: 0.3

# AI Backend
ai:
  default_backend: "claude"
  max_history: 20          # max conversation turns to keep

  # Native Anthropic API (uses anthropic SDK)
  claude:
    api_key: "${ANTHROPIC_API_KEY}"
    model: "claude-sonnet-4-20250514"

  # OpenAI-compatible providers
  # Add any provider with: api_key, model, base_url
  # Set no_auth: true for local proxies that don't need a key
  providers:
    claude-proxy:
      model: "claude-sonnet-4"
      base_url: "http://localhost:3456/v1"
      no_auth: true

    openai:
      api_key: "${OPENAI_API_KEY}"
      model: "gpt-4o"
      base_url: "https://api.openai.com/v1"

    zai:
      api_key: "${ZAI_API_KEY}"
      model: ""
      base_url: ""

    ollama:
      model: "qwen3-vl"
      base_url: "http://localhost:11434/v1"
      no_auth: true

    # --- Add more providers as needed ---
    # gemini:
    #   api_key: "${GEMINI_API_KEY}"
    #   model: "gemini-2.5-pro"
    #   base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
    #
    # alibaba:
    #   api_key: "${DASHSCOPE_API_KEY}"
    #   model: "qwen-max"
    #   base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    #
    # deepseek:
    #   api_key: "${DEEPSEEK_API_KEY}"
    #   model: "deepseek-chat"
    #   base_url: "https://api.deepseek.com/v1"
    #
    # ollama:
    #   model: "llama3:8b"
    #   base_url: "http://localhost:11434/v1"
    #   no_auth: true

# Memory system (conversation summaries, user facts, semantic search)
memory:
  enabled: true
  recent_window: 80           # messages in short-term window (40 turns)
  summarize_threshold: 40     # messages beyond window before summarization triggers
  max_facts: 50
  max_notes: 20
  notes_ttl_days: 14          # auto-resolve notes older than N days
  search_half_life_days: 30   # temporal decay half-life for search results
  semantic_search: true       # enable vector search (requires openocto[search])

# Skills (LLM-callable capabilities — wired into the AI tool-use loop)
skills:
  enabled:
    - time
    - weather
    - unit_converter
    - notes
    - timer
    - file_ops
    - launcher
    - media_player

  time:
    default_timezone: null      # null = host local time, or e.g. "Europe/Moscow"

  weather:
    default_location: null      # e.g. "Москва" or "Berlin"
    units: metric               # metric | imperial

  file_ops:
    allowed_dirs:
      - "~/Videos"
      - "~/Movies"
      - "~/Music"
      - "~/Downloads"
      - "~/Documents"
      - "~/Pictures"

  launcher:
    # vlc/mpv intentionally NOT here — use media_player skill for video/audio
    # playback so the LLM can control pause/stop/seek/volume. The launcher is
    # only for non-media apps (browser, editor, etc.).
    allowed_apps:
      - firefox
      - chromium
      - chromium-browser
      - code

  media_player:
    binary: null                # null = auto-discover vlc on PATH
    rc_port: 9919
    fullscreen_default: true

# Web Admin
web:
  enabled: true
  host: "0.0.0.0"
  port: 8080

# MCP (Model Context Protocol) server
# Expose skills as MCP tools — usable from Claude CLI, VS Code, and other MCP clients.
# LAN access: configure Claude CLI with `claude mcp add openocto http://<ip>:8765/mcp`
mcp:
  enabled: false               # set true to start MCP server alongside web
  host: "0.0.0.0"             # bind to all interfaces for LAN access
  port: 8765
  require_auth: true           # token in ~/.openocto/mcp-token (chmod 600)

# mDNS / Bonjour — publish OpenOcto as `<hostname>.local` on the LAN so
# mobile apps and other clients can find it without typing an IP address.
# Service type: _openocto._tcp.local
mdns:
  enabled: true
  # hostname: derived from the system hostname by default to avoid collisions
  # when running >1 OpenOcto instance on the same LAN. e.g. "raspberrypi" →
  # "openocto-raspberrypi.local". Override here to pick a custom name like
  # "kitchen-octo" → "kitchen-octo.local".
  # hostname: "openocto"
  service_name: "OpenOcto Voice Assistant"

# Logging
logging:
  level: "INFO"
  file: null                    # e.g. "~/.openocto/logs/openocto.log" — enables rotating file handler
  max_bytes: 5242880            # 5 MB
  backup_count: 3
